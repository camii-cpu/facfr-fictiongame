<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法文系館大冒險 · L'Aventure de la Fac de Français</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── WARM (ZH) THEME ── */
:root[data-lang="zh"] {
  --bg:#080603;--bg2:#0e0b07;--bg3:#14100a;
  --border:#2e2010;--border2:#4a3218;
  --gold:#d4a843;--gold2:#e8c97a;
  --text:#c8b490;--text2:#8a7055;--text3:#504030;
  --green:#5a9a78;--green2:#3a6a50;
  --red:#9a4a3a;--paper:#1a1408;
  --player-color:#7ab8a8;--player-border:#2a5848;
  --accent:#7a5a28;
}
/* ── COOL (FR) THEME ── */
:root[data-lang="fr"] {
  --bg:#04060a;--bg2:#080c14;--bg3:#0c1220;
  --border:#1a2540;--border2:#2e4070;
  --gold:#8bafd4;--gold2:#b8d4f0;
  --text:#a8c0e0;--text2:#5a7898;--text3:#304060;
  --green:#5a8aa8;--green2:#3a6080;
  --red:#6a7fa8;--paper:#060a12;
  --player-color:#7ab0d8;--player-border:#2a5888;
  --accent:#4a90c8;
}

html,body{
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:'IM Fell English',Georgia,serif;
  font-size:16px;line-height:1.6;
  overflow-x:hidden;
  transition:background .4s,color .4s;
}

/* nebula bg for FR */
:root[data-lang="fr"] body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(1px 1px at 10% 15%,rgba(200,216,240,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 30% 40%,rgba(200,216,240,.3) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 55% 8%,rgba(200,216,240,.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 75% 25%,rgba(200,216,240,.4) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 88% 50%,rgba(200,216,240,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 20% 75%,rgba(200,216,240,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 60% 80%,rgba(200,216,240,.4) 0%,transparent 100%),
    radial-gradient(ellipse at 30% 20%,rgba(42,90,136,.07) 0%,transparent 50%),
    radial-gradient(ellipse at 70% 80%,rgba(74,144,200,.05) 0%,transparent 50%),
    linear-gradient(180deg,#04060a 0%,#060814 40%,#04060a 100%);
  pointer-events:none;z-index:0;
}

#app{
  display:grid;grid-template-rows:auto 1fr auto auto;
  height:100vh;max-width:820px;margin:0 auto;
  border-left:1px solid var(--border);border-right:1px solid var(--border);
  position:relative;z-index:1;
  background:rgba(0,0,0,.05);
  transition:border-color .4s;
}

/* ── HEADER ── */
#header{
  background:var(--bg2);border-bottom:1px solid var(--border2);
  padding:12px 24px 10px;
  transition:background .4s,border-color .4s;
}
#title-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:12px}
#title-block{flex:1;min-width:0}
#game-title{
  font-family:'Cinzel',serif;font-size:15px;font-weight:600;
  color:var(--gold2);letter-spacing:2px;
  text-shadow:0 0 18px rgba(212,168,67,.3);
  transition:color .4s;
}
#game-subtitle{font-size:11px;color:var(--text2);font-style:italic;letter-spacing:1px;margin-top:2px}

/* header right: lang btn + restart */
#header-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}

/* LANGUAGE SWITCHER */
#lang-btn{
  font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;
  padding:4px 14px;border-radius:2px;cursor:pointer;
  border:1px solid var(--gold);color:var(--gold2);
  background:var(--paper);
  transition:all .2s;
  white-space:nowrap;
}
#lang-btn:hover{background:var(--border2);box-shadow:0 0 8px rgba(212,168,67,.2)}

/* lang transition flash */
#app.lang-switch{animation:langFlash .35s ease;}
@keyframes langFlash{
  0%{opacity:1}40%{opacity:.15}100%{opacity:1}
}

#restart-btn{
  font-family:'Special Elite',monospace;font-size:11px;letter-spacing:1px;
  padding:4px 12px;background:transparent;border:1px solid var(--border2);
  color:var(--text2);cursor:pointer;border-radius:2px;transition:all .15s;
  white-space:nowrap;
}
#restart-btn:hover{color:var(--gold2);border-color:var(--accent)}

#status-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.pill{
  font-family:'Special Elite',monospace;font-size:11px;padding:2px 10px;
  border:1px solid var(--border);border-radius:2px;color:var(--text2);
  background:var(--bg3);transition:background .4s,border-color .4s;
}
.pill.hi{border-color:var(--border2);color:var(--gold)}
.pill.side{border-color:var(--green2);color:var(--green);display:none}

/* ── LOG ── */
#log{overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
#log::-webkit-scrollbar{width:5px}
#log::-webkit-scrollbar-track{background:var(--bg2)}
#log::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.msg{line-height:1.75;font-size:15px}
.msg.gm{color:var(--text);padding-left:14px;border-left:2px solid var(--border2)}
.msg.player{color:var(--player-color);font-style:italic;font-size:13px;padding-left:14px;border-left:2px solid var(--player-border)}
.msg.sys{color:var(--text3);font-size:12px;font-style:italic;text-align:center;padding:4px 0}
.msg.warn{color:var(--red);font-size:13px;text-align:center;font-style:italic}
.msg.ok{color:var(--green);font-size:13px;text-align:center}

/* ── INVENTORY ── */
#inv-section{
  background:var(--bg2);border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);padding:8px 24px;
  transition:background .4s;
}
#inv-label{font-family:'Special Elite',monospace;font-size:11px;color:var(--text3);letter-spacing:1.5px;margin-bottom:6px}
#inv-chips{display:flex;gap:6px;flex-wrap:wrap;min-height:24px;align-items:center}
.chip{font-family:'Special Elite',monospace;font-size:11px;padding:3px 10px;border-radius:2px;letter-spacing:.5px}
.chip.item{border:1px solid var(--border2);color:var(--gold2);background:var(--paper)}
.chip.side{border:1px solid var(--green2);color:var(--green);background:var(--paper)}
.chip.empty{border:1px solid var(--border);color:var(--text3);font-style:italic}

/* ── INPUT ── */
#input-area{
  display:flex;padding:12px 24px;
  background:var(--bg2);border-top:1px solid var(--border2);
  transition:background .4s;
}
#user-input{
  flex:1;background:var(--bg3);border:1px solid var(--border2);border-right:none;
  color:var(--text);font-family:'IM Fell English',serif;font-size:15px;
  padding:9px 14px;outline:none;border-radius:2px 0 0 2px;transition:border-color .15s;
}
#user-input::placeholder{color:var(--text3);font-style:italic}
#user-input:focus{border-color:var(--accent)}
#send-btn{
  background:var(--paper);border:1px solid var(--border2);color:var(--gold2);
  font-family:'Special Elite',monospace;font-size:13px;padding:9px 20px;
  cursor:pointer;border-radius:0 2px 2px 0;letter-spacing:1px;
  transition:background .15s;white-space:nowrap;
}
#send-btn:hover{background:var(--border)}

/* ── CHOICES ── */
.choices{display:flex;flex-direction:column;gap:6px;margin-top:8px;padding-left:14px;border-left:2px solid var(--border)}
.choice-btn{
  font-family:'IM Fell English',serif;font-size:14px;text-align:left;
  padding:6px 12px;background:var(--bg3);border:1px solid var(--border);
  color:var(--text2);cursor:pointer;border-radius:2px;transition:all .15s;
}
.choice-btn:hover{border-color:var(--border2);color:var(--text);background:var(--paper)}

/* ── ITEM REFS ── */
.ir{color:var(--gold2);font-weight:600}
.sr{color:var(--green);font-weight:600}

/* ── VICTORY ── */
#victory{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.9);z-index:100;
  align-items:center;justify-content:center;
  flex-direction:column;gap:20px;padding:40px;text-align:center;
}
#victory.show{display:flex}
#victory h2{font-family:'Cinzel',serif;color:var(--gold2);font-size:28px;letter-spacing:3px;text-shadow:0 0 30px rgba(212,168,67,.5)}
#victory p{color:var(--text);font-size:15px;font-style:italic;max-width:440px}
#victory button{
  font-family:'Cinzel',serif;font-size:13px;letter-spacing:1.5px;
  padding:10px 28px;background:transparent;border:1px solid var(--gold);
  color:var(--gold2);cursor:pointer;border-radius:2px;margin-top:10px;transition:all .15s;
}
#victory button:hover{background:var(--paper)}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="title-row">
      <div id="title-block">
        <div id="game-title">⚜ 法文系館大冒險</div>
        <div id="game-subtitle">L'Aventure de la Fac de Français</div>
      </div>
      <div id="header-actions">
        <button id="lang-btn" onclick="switchLang()">🇫🇷 Français</button>
        <button id="restart-btn" onclick="restartGame()">↺ <span id="restart-label">重新開始</span></button>
      </div>
    </div>
    <div id="status-bar">
      <span class="pill hi" id="loc-pill">📍 1F 大門</span>
      <span class="pill" id="prog-pill">🔑 主線進行中</span>
      <span class="pill side" id="side-pill">✦ 支線進行中</span>
    </div>
  </div>

  <div id="log"></div>

  <div id="inv-section">
    <div id="inv-label">▸ <span id="inv-label-text">背包 INVENTAIRE</span></div>
    <div id="inv-chips"><span class="chip empty" id="inv-empty">— 空無一物 —</span></div>
  </div>

  <div id="input-area">
    <input id="user-input" type="text" placeholder="輸入行動，或點選下方選項…" autocomplete="off"/>
    <button id="send-btn" onclick="handleInput()"><span id="send-label">傳送</span> ▶</button>
  </div>
</div>

<div id="victory">
  <h2 id="victory-title">✦ 恭喜通關 ✦</h2>
  <p id="victory-body">法文系館的謎霧終於散去⋯⋯<br>你通過了一切考驗，順利抵達系辦，<br>完成了這場不可思議的冒險。</p>
  <p style="font-size:13px;color:var(--text2);margin-top:8px"><em>Tu as traversé tous les mystères du département.</em></p>
  <button onclick="restartGame()" id="replay-btn">↺ 再玩一次</button>
</div>

<script>
// ═══════════════════════════════════════════
//  LANGUAGE
// ═══════════════════════════════════════════
let LANG = 'zh'; // 'zh' | 'fr'

const UI_TEXT = {
  zh: {
    title:'⚜ 法文系館大冒險',
    langBtn:'🇫🇷 Français',
    restart:'重新開始',
    invLabel:'背包 INVENTAIRE',
    invEmpty:'— 空無一物 —',
    send:'傳送',
    inputPlaceholder:'輸入行動，或點選下方選項…',
    progMain:'🔑 主線進行中',
    progSign:'🔑 持有簽名',
    progWin:'🏆 通關！',
    sideQuest:'✦ 支線進行中',
    victoryTitle:'✦ 恭喜通關 ✦',
    victoryBody:'法文系館的謎霧終於散去⋯⋯<br>你通過了一切考驗，順利抵達系辦，<br>完成了這場不可思議的冒險。',
    replay:'↺ 再玩一次',
  },
  fr: {
    title:'⚜ L\'Aventure de la Fac de Français',
    langBtn:'🇹🇼 中文',
    restart:'Recommencer',
    invLabel:'INVENTAIRE',
    invEmpty:'— vide —',
    send:'Agir',
    inputPlaceholder:'Entrez une action, ou choisissez une option ci-dessous…',
    progMain:'🔑 Quête principale en cours',
    progSign:'🔑 Signature obtenue',
    progWin:'🏆 Victoire !',
    sideQuest:'✦ Quête secondaire en cours',
    victoryTitle:'✦ Victoire ✦',
    victoryBody:'Les brumes mystérieuses de la Fac de Français se dissipent enfin…<br>Vous avez surmonté toutes les épreuves et êtes parvenu au Secrétariat.',
    replay:'↺ Rejouer',
  }
};

function t(key){ return UI_TEXT[LANG][key]; }

function applyLangUI(){
  document.documentElement.setAttribute('data-lang', LANG);
  document.getElementById('game-title').textContent = t('title');
  document.getElementById('lang-btn').textContent = t('langBtn');
  document.getElementById('restart-label').textContent = t('restart');
  document.getElementById('inv-label-text').textContent = t('invLabel');
  document.getElementById('send-label').textContent = t('send');
  document.getElementById('user-input').placeholder = t('inputPlaceholder');
  document.getElementById('victory-title').textContent = t('victoryTitle');
  document.getElementById('victory-body').innerHTML = t('victoryBody');
  document.getElementById('replay-btn').textContent = t('replay');
  updateUI();
}

function switchLang(){
  LANG = (LANG === 'zh') ? 'fr' : 'zh';
  // flash animation
  const app = document.getElementById('app');
  app.classList.add('lang-switch');
  setTimeout(()=>app.classList.remove('lang-switch'), 400);
  applyLangUI();
  // replay the game in new language
  restartGame();
}

// ═══════════════════════════════════════════
//  ITEMS  (language-keyed)
// ═══════════════════════════════════════════
const ITEMS_ZH = {
  CROISSANT:'可頌', PAPER:'空白資料', PEN:'羽毛筆', KEY:'黃銅鑰匙',
  NOTES:'希臘羅馬神話筆記', SIGN:'Tanguy簽名',
  BOVARY_NOTES:'包法利夫人小說考試重點',
  EXAM_PASS:'期末考及格考卷',
  BUFFET:'法文系Buffet免費券'
};
const ITEMS_FR = {
  CROISSANT:'🥐 Croissant', PAPER:'📄 Feuille Vierge', PEN:'🪶 Plume de Laiton',
  KEY:'🗝️ Clé de Laiton', NOTES:'📖 Notes de Mythologie Gréco-Romaine',
  SIGN:'✍️ Signature de Tanguy',
  BOVARY_NOTES:"📝 Notes d'Examen — Madame Bovary",
  EXAM_PASS:"📜 Copie d'Examen Réussie",
  BUFFET:'🎫 Bon Buffet Gratuit du Département'
};

function ITEMS(){ return LANG==='zh' ? ITEMS_ZH : ITEMS_FR; }
const SIDE_KEYS = ['BOVARY_NOTES','EXAM_PASS','BUFFET'];
function isSide(name){ return SIDE_KEYS.some(k=>ITEMS()[k]===name); }

// ═══════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════
let inv = [];
let loc = '1F大門';
let trapped216=false, thomasHelped=false, tanguyDone=false;
let exam103Done=false, bovarySide=false, examSide=false, oralSide=false;
let buffetUsed=false, pendingChoice=null;
let tanguyQuizActive=false, tanguyQuizQueue=[], tanguyCorrect=0, tanguyAnswered=0;
const TANGUY_PASS=3, TANGUY_TOTAL=10;

// ═══════════════════════════════════════════
//  DOM
// ═══════════════════════════════════════════
const logEl    = document.getElementById('log');
const inputEl  = document.getElementById('user-input');
const locPill  = document.getElementById('loc-pill');
const progPill = document.getElementById('prog-pill');
const sidePill = document.getElementById('side-pill');
const invChips = document.getElementById('inv-chips');

function ir(name){ return `<span class="ir">[${name}]</span>`; }
function sr(name){ return `<span class="sr">[${name}]</span>`; }
function itemRef(name){ return isSide(name)?sr(name):ir(name); }

function msg(html, type='gm'){
  const d=document.createElement('div');
  d.className='msg '+type;
  d.innerHTML=html;
  logEl.appendChild(d);
  logEl.scrollTop=logEl.scrollHeight;
  return d;
}

function showChoices(opts){
  pendingChoice=opts;
  const wrap=document.createElement('div');
  wrap.className='choices'; wrap.id='choices-wrap';
  opts.forEach((o,idx)=>{
    const b=document.createElement('button');
    b.className='choice-btn';
    b.textContent=(idx+1)+'. '+o.text;
    b.onclick=()=>{ wrap.remove(); pendingChoice=null; msg('▷ '+o.text,'player'); o.fn(); };
    wrap.appendChild(b);
  });
  logEl.appendChild(wrap);
  logEl.scrollTop=logEl.scrollHeight;
}

function updateUI(){
  // location pill
  const IT = ITEMS();
  const locNames_zh={
    '1F大門':'1F 大門','112教室':'112 教室','108教室':'108 教室',
    '103教室':'103 教室','216教室':'216 教室','217教室':'217 教室',
    '210教室':'210 教室','魔光實驗室':'魔光實驗室',
    'A226教室':'A226 教室','休息區':'休息區','法文系辦':'3F 法文系辦'
  };
  const locNames_fr={
    '1F大門':'1F — Grande Entrée','112教室':'Salle 112','108教室':'Salle 108',
    '103教室':'Salle 103','216教室':'Salle 216','217教室':'Salle 217',
    '210教室':'Salle 210','魔光實驗室':'Laboratoire de Lumière Magique',
    'A226教室':'A226','休息區':'Coin Repos','法文系辦':'3F — Secrétariat'
  };
  const locNames = LANG==='zh' ? locNames_zh : locNames_fr;
  locPill.textContent='📍 '+(locNames[loc]||loc);

  // progress pill
  if(loc==='法文系辦') progPill.textContent=t('progWin');
  else if(tanguyDone) progPill.textContent=t('progSign');
  else progPill.textContent=t('progMain');

  // side pill
  const hasSide=inv.some(x=>isSide(x));
  sidePill.style.display=hasSide?'inline':'none';
  sidePill.textContent=t('sideQuest');

  // inventory
  if(inv.length===0){
    invChips.innerHTML=`<span class="chip empty">${t('invEmpty')}</span>`;
    return;
  }
  invChips.innerHTML=inv.map(x=>{
    const cls=isSide(x)?'chip side':'chip item';
    return `<span class="${cls}">${x}</span>`;
  }).join('');
}

function has(key){ return inv.includes(ITEMS()[key]); }
function give(key){ const n=ITEMS()[key]; if(!inv.includes(n)) inv.push(n); updateUI(); }
function take(key){ const n=ITEMS()[key]; inv=inv.filter(x=>x!==n); updateUI(); }
function go(place){ loc=place; updateUI(); }
function I(key){ return ITEMS()[key]; }

// ═══════════════════════════════════════════
//  LOCATION ROUTER
// ═══════════════════════════════════════════
function describeLocation(){
  const old=document.getElementById('choices-wrap');
  if(old) old.remove();
  pendingChoice=null;
  switch(loc){
    case '1F大門':   return loc1F();
    case '112教室':  return loc112();
    case '108教室':  return loc108();
    case '103教室':  return loc103();
    case '216教室':  return loc216();
    case '217教室':  return loc217();
    case '210教室':  return loc210();
    case '魔光實驗室': return locLab();
    case 'A226教室': return locA226();
    case '休息區':   return locRest();
    case '法文系辦': return locOffice();
  }
}

// ─── NAV HELPERS ───
function nav1F(){
  return LANG==='zh' ? [
    {text:'前往 112 教室',fn:()=>{go('112教室');describeLocation();}},
    {text:'前往 108 教室',fn:()=>{go('108教室');describeLocation();}},
    {text:'前往 103 教室',fn:()=>{go('103教室');describeLocation();}},
    {text:'前往 2F（樓梯）',fn:()=>{msg('你踏上吱呀作響的石階，空氣中漂浮著舊書與蠟燭的氣息。');showChoices(nav2F());}},
  ] : [
    {text:'Se rendre en Salle 112',fn:()=>{go('112教室');describeLocation();}},
    {text:'Se rendre en Salle 108',fn:()=>{go('108教室');describeLocation();}},
    {text:'Se rendre en Salle 103',fn:()=>{go('103教室');describeLocation();}},
    {text:'Monter au 2F (escalier)',fn:()=>{msg("Vous gravissez l'escalier en colimaçon. L'air embaume les vieux livres et la cire de bougie.");showChoices(nav2F());}},
  ];
}
function nav2F(){
  return LANG==='zh' ? [
    {text:'前往 216 教室',fn:()=>{go('216教室');describeLocation();}},
    {text:'前往 217 教室',fn:()=>{go('217教室');describeLocation();}},
    {text:'前往 210 教室',fn:()=>{go('210教室');describeLocation();}},
    {text:'前往 A226 教室',fn:()=>{go('A226教室');describeLocation();}},
    {text:'前往 魔光實驗室',fn:()=>{go('魔光實驗室');describeLocation();}},
    {text:'前往 休息區',fn:()=>{go('休息區');describeLocation();}},
    {text:'返回 1F',fn:()=>{go('1F大門');describeLocation();}},
  ] : [
    {text:'Se rendre en Salle 216',fn:()=>{go('216教室');describeLocation();}},
    {text:'Se rendre en Salle 217',fn:()=>{go('217教室');describeLocation();}},
    {text:'Se rendre en Salle 210',fn:()=>{go('210教室');describeLocation();}},
    {text:'Se rendre en A226',fn:()=>{go('A226教室');describeLocation();}},
    {text:'Se rendre au Laboratoire de Lumière Magique',fn:()=>{go('魔光實驗室');describeLocation();}},
    {text:'Se rendre au Coin Repos',fn:()=>{go('休息區');describeLocation();}},

      :`La lumière magique du laboratoire continue de baigner la salle, mais une place vide sur l'étagère rappelle que vous avez déjà pris les notes.`);

}

  {q:'希臘神話中，普羅米修斯（Prometheus）偷取了什麼送給人類？',opts:['火焰','神酒（Ambrosia）','黃金'],ans:0},
  {q:'特洛伊戰爭的導火線，金蘋果最後由誰獲得？',opts:['雅典娜（Athena）','阿芙蘿黛蒂（Aphrodite）','赫拉（Hera）'],ans:1},
  {q:'奧德修斯（Odysseus）在返鄉途中，被哪位女神留在島上長達七年？',opts:['克爾刻（Circe）','卡呂普索（Calypso）','塞壬（Siren）'],ans:1},
  {q:'冥界的統治者黑帝斯（Hades），其羅馬名對應為？',opts:['普魯托（Pluto）','薩圖恩（Saturn）','武爾卡努斯（Vulcanus）'],ans:0},
  {q:'赫拉克勒斯（Heracles）十二試煉中，第一項任務是殺死哪隻怪獸？',opts:['九頭蛇許德拉（Hydra）','涅墨亞獅子（Nemean Lion）','厄律曼托斯野豬（Erymanthian Boar）'],ans:1},
  {q:'希臘神話中，誰是音樂與詩歌之神，同時也是太陽神？',opts:['阿波羅（Apollo）','赫密斯（Hermes）','戴歐尼修斯（Dionysus）'],ans:0},

function startTanguyQuiz(){
  tanguyQuizActive=true; tanguyCorrect=0; tanguyAnswered=0;
  const pool = LANG==='zh' ? TQ_ZH : TQ_FR;
  tanguyQuizQueue=[...pool].sort(()=>Math.random()-0.5);
  msg(LANG==='zh'
    ?`Tanguy接過 ${ir(I('NOTES'))}，迅速翻閱，眼神如鷹隼般銳利。<br><em>「不錯。這本筆記……尚可。」</em><br>他闔上筆記，目光直射向你。<br><em>「但光有筆記還不夠。你必須向我證明，你真的理解這些神話。<br>我將出十道題，你需答對三題，方可獲得我的簽名。」</em>`
    :`Tanguy saisit les ${ir(I('NOTES'))} et les parcourt d'un regard d'aigle.<br><em>« Ces notes… sont acceptables. »</em><br>Il referme le volume d'un geste sec et vous fixe droit dans les yeux.<br><em>« Mais posséder un livre ne signifie pas le comprendre.<br>Je vais vous soumettre dix questions. Répondez-en correctement trois — et vous aurez ma signature. »</em>`);
  setTimeout(()=>askTanguyQuestion(),400);
}

function askTanguyQuestion(){
  if(tanguyAnswered>=TANGUY_TOTAL){endTanguyQuiz();return;}
  const q=tanguyQuizQueue[tanguyAnswered];
  const stillNeed=Math.max(0,TANGUY_PASS-tanguyCorrect);
  msg(LANG==='zh'
    ?`<em>（第 ${tanguyAnswered+1} / ${TANGUY_TOTAL} 題　已答對 ${tanguyCorrect} 題　尚需答對 ${stillNeed} 題）</em>`
    :`<em>(Question ${tanguyAnswered+1} / ${TANGUY_TOTAL} — ${tanguyCorrect} correcte(s) — encore ${stillNeed} requise(s))</em>`,'sys');
  msg(`<strong>「${q.q}」</strong>`);
  showChoices(q.opts.map((opt,idx)=>({
    text:String.fromCharCode(65+idx)+'. '+opt,
    fn:()=>handleTanguyAnswer(idx)
  })));
}

function handleTanguyAnswer(chosen){
  const q=tanguyQuizQueue[tanguyAnswered]; tanguyAnswered++;
  if(chosen===q.ans){
    tanguyCorrect++;
    msg(LANG==='zh'?`<em>「……正確。」</em> Tanguy淡淡地點了點頭。`:`<em>« …Exact. »</em> Tanguy hoche la tête, imperceptiblement.`,'ok');
  } else {
    const correct=String.fromCharCode(65+q.ans)+'. '+q.opts[q.ans];
    msg(LANG==='zh'?`<em>「錯了。正確答案是：${correct}。」</em> Tanguy的眉頭微微皺起。`:`<em>« Faux. La bonne réponse était : ${correct}. »</em> Un pli soucieux barre le front de Tanguy.`,'warn');
  }
  const remaining=TANGUY_TOTAL-tanguyAnswered;
  if(tanguyCorrect>=TANGUY_PASS) setTimeout(()=>endTanguyQuiz(),300);
  else if(remaining<(TANGUY_PASS-tanguyCorrect)) setTimeout(()=>endTanguyQuiz(),300);
  else setTimeout(()=>askTanguyQuestion(),300);
}

function endTanguyQuiz(){
  tanguyQuizActive=false;
  if(tanguyCorrect>=TANGUY_PASS){
    tanguyDone=true; give('SIGN');
    msg(LANG==='zh'
      ?`Tanguy靜默片刻，最終點頭。<br><em>「十題中答對了 ${tanguyCorrect} 題。你對神話的理解……算是及格。」</em><br>他取出一枚印有橄欖枝的印章，在一張羊皮紙上蓋下印記，鄭重地遞給你。<br>${ir(I('SIGN'))} 已收入背包。<br><em>「去找103教室吧。那裡有人在等。」</em>`
      :`Tanguy observe un long silence. Puis, il acquiesce.<br><em>« ${tanguyCorrect} bonnes réponses sur dix. Vous méritez ceci. »</em><br>Il sort un sceau orné d'un rameau d'olivier et l'appose sur un parchemin qu'il vous tend avec solennité.<br>${ir(I('SIGN'))} ajouté à l'inventaire.<br><em>« Allez voir la Professeure Xu en Salle 103. Elle vous indiquera la voie vers le 3F. »</em>`,'ok');
    describeLocation();
  } else {
    msg(LANG==='zh'
      ?`Tanguy緩緩搖頭，將你的筆記推回桌面。<br><em>「十題中只答對了 ${tanguyCorrect} 題——遠遠不夠。<br>回去好好研讀，再來挑戰。」</em><br>他轉身繼續在黑板上繪製奧林帕斯的系譜圖，不再理會你。`
      :`Tanguy secoue lentement la tête et vous restitue vos notes.<br><em>« ${tanguyCorrect} bonne(s) réponse(s) sur dix — c'est insuffisant.<br>Relisez attentivement, et revenez me voir. »</em><br>Il se retourne vers son tableau et ne vous accorde plus un seul regard.`,'warn');
    showChoices(nav2F());
  }
}

function handleInput(){
  const raw=inputEl.value.trim(); if(!raw) return;
  inputEl.value='';
  msg('▷ '+raw,'player');
  const t=raw.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');

  // room navigation
  const roomMap={'112':()=>{go('112教室');describeLocation();},'108':()=>{go('108教室');describeLocation();},'103':()=>{go('103教室');describeLocation();},'216':()=>{go('216教室');describeLocation();},'217':()=>{go('217教室');describeLocation();},'210':()=>{go('210教室');describeLocation();},'226':()=>{go('A226教室');describeLocation();}};
  for(const [k,fn] of Object.entries(roomMap)) if(t.includes(k)){fn();return;}

  // ZH keywords
  if(LANG==='zh'){
    if(t.includes('實驗室')||t.includes('labo')){go('魔光實驗室');describeLocation();return;}
    if(t.includes('休息')||t.includes('repos')){go('休息區');describeLocation();return;}
    if(t.includes('系辦')){if(exam103Done){go('法文系辦');describeLocation();}else msg('你感覺某條路還未開啟，系辦的方向依舊模糊不清。','warn');return;}
    if(t.includes('1f')||t.includes('一樓')){go('1F大門');describeLocation();return;}
    if((t.includes('返回')||t.includes('離開'))&&loc!=='1F大門'){go('1F大門');describeLocation();return;}
  } else {
    if(t.includes('labo')||t.includes('laboratoire')){go('魔光實驗室');describeLocation();return;}
    if(t.includes('repos')){go('休息區');describeLocation();return;}
    if(t.includes('secretariat')||t.includes('3f')){if(exam103Done){go('法文系辦');describeLocation();}else msg("Un chemin semble encore fermé — la direction du Secrétariat reste floue.",'warn');return;}
    if(t.includes('1f')){go('1F大門');describeLocation();return;}
    if((t.includes('partir')||t.includes('sortir'))&&loc!=='1F大門'){go('1F大門');describeLocation();return;}
  }

  // item pickup / give fallback
  msg(LANG==='zh'
    ?'四周的空氣輕輕震動，卻沒有給出明確的回應。<br>或許試試其他方向，或點選下方選項？'
    :"L'air environnant frémit légèrement, sans donner de réponse claire.<br>Essayez peut-être une autre direction, ou choisissez une option ci-dessous.",'sys');
  if(loc) describeLocation();
}
